<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Upload Truyện</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #2c2c2c; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #555; border-radius: 6px; }
        legend { color: #ffcc00; font-weight: bold; }
        label { display: block; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 15px; background-color: #3a3a3a; color: #fff; border: 1px solid #555; border-radius: 4px; }
        button { padding: 10px 20px; background: #ffcc00; color: #2c2c2c; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { opacity: 0.9; }
        .chapter { border: 1px solid #444; padding: 10px; margin-bottom: 15px; border-radius: 6px; }
        .tab-selector { display: flex; gap: 10px; margin-bottom: 10px; }
        .tab-btn { padding: 5px 10px; background: #444; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        .tab-btn.active { background: #ffcc00; color: #2c2c2c; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        #progress { margin-top: 10px; color: #ffcc00; }
        #output { margin-top: 20px; white-space: pre-wrap; background: #333; padding: 15px; border-radius: 6px; font-family: monospace; max-height: 300px; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Truyện Mới</h1>

        <label for="token">GitHub Token:</label>
        <input type="password" id="token" placeholder="Nhập Personal Access Token" required />

        <form id="upload-form">
            <fieldset>
                <legend>Thông tin truyện</legend>
                <label for="title">Tên truyện:</label>
                <input type="text" id="title" required />

                <label for="description">Mô tả:</label>
                <textarea id="description" rows="3"></textarea>

                <label>Ảnh bìa:</label>
                <div class="tab-selector">
                    <button type="button" class="tab-btn active" data-tab="upload-cover">Tải lên</button>
                    <button type="button" class="tab-btn" data-tab="url-cover">URL</button>
                </div>

                <div id="upload-cover" class="tab-content active">                    <input type="file" id="cover-upload" accept="image/*" />
                </div>

                <div id="url-cover" class="tab-content">
                    <input type="text" id="cover-url" placeholder="https://example.com/image.jpg" />
                </div>
            </fieldset>

            <fieldset>
                <legend>Chương truyện</legend>
                <div id="chapters-container">
                    <div class="chapter">
                        <label>Chapter 1:</label>
                        <input type="text" placeholder="Tên chapter" class="chapter-name" />

                        <div class="tab-selector">
                            <button type="button" class="tab-btn active" data-tab="upload-pages-0">Tải lên</button>
                            <button type="button" class="tab-btn" data-tab="url-pages-0">URL</button>
                        </div>

                        <div id="upload-pages-0" class="tab-content active">
                            <input type="file" multiple accept="image/*" class="chapter-pages-upload" />
                        </div>

                        <div id="url-pages-0" class="tab-content">
                            <div class="pages-url-container">
                                <div class="page-input">
                                    <input type="text" placeholder="https://example.com/page1.jpg" class="page-url-input" />
                                    <button type="button" class="remove-page">-</button>
                                </div>
                            </div>
                            <button type="button" class="add-page-url">+ Thêm URL ảnh</button>
                        </div>
                    </div>
                </div>

                <button type="button" id="add-chapter">+ Thêm Chapter</button>
            </fieldset>

            <button type="submit">Upload Truyện & Ảnh Lên GitHub</button>
        </form>

        <div id="progress" class="hidden">Đang xử lý...</div>
        <div id="output" class="hidden"></div>
    </div>

    <script>
        const REPO_NAME = "tamdz123-code/genben-world.com";

        document.querySelectorAll('.tab-btn').forEach(btn => {            btn.addEventListener('click', () => {
                const tabType = btn.getAttribute('data-tab');
                document.querySelectorAll(`.tab-btn[data-tab^="${tabType.split('-')[0]}"]`).forEach(b => b.classList.remove('active'));
                document.querySelectorAll(`.${tabType.split('-')[0]}-content`).forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(tabType).classList.add('active');
            });
        });

        let chapterCount = 1;
        document.getElementById("add-chapter").addEventListener("click", () => {
            const container = document.getElementById("chapters-container");
            const index = chapterCount;

            const div = document.createElement("div");
            div.className = "chapter";
            div.innerHTML = `
                <label>Chapter ${chapterCount + 1}:</label>
                <input type="text" placeholder="Tên chapter" class="chapter-name" />

                <div class="tab-selector">
                    <button type="button" class="tab-btn active" data-tab="upload-pages-${index}">Tải lên</button>
                    <button type="button" class="tab-btn" data-tab="url-pages-${index}">URL</button>
                </div>

                <div id="upload-pages-${index}" class="tab-content active">
                    <input type="file" multiple accept="image/*" class="chapter-pages-upload" />
                </div>

                <div id="url-pages-${index}" class="tab-content">
                    <div class="pages-url-container">
                        <div class="page-input">
                            <input type="text" placeholder="https://example.com/page1.jpg" class="page-url-input" />
                            <button type="button" class="remove-page">-</button>
                        </div>
                    </div>
                    <button type="button" class="add-page-url">+ Thêm URL ảnh</button>
                </div>
            `;
            container.appendChild(div);

            div.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const tabType = btn.getAttribute('data-tab');
                    btn.parentElement.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.parentElement.parentElement.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(tabType).classList.add('active');
                });
            });
            setupUrlHandlers(div);
            chapterCount++;
        });

        function setupUrlHandlers(container) {
            container.querySelectorAll('.add-page-url').forEach(btn => {
                btn.addEventListener('click', () => {
                    const containerDiv = btn.previousElementSibling;
                    const newInput = document.createElement("div");
                    newInput.className = "page-input";
                    newInput.innerHTML = `
                        <input type="text" placeholder="https://example.com/page.jpg" class="page-url-input" />
                        <button type="button" class="remove-page">-</button>
                    `;
                    containerDiv.appendChild(newInput);
                    newInput.querySelector('.remove-page').addEventListener('click', () => newInput.remove());
                });
            });
            container.querySelectorAll('.remove-page').forEach(btn => {
                btn.addEventListener('click', () => btn.parentElement.remove());
            });
        }

        setupUrlHandlers(document);

        document.getElementById("upload-form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const token = document.getElementById("token").value;
            const progress = document.getElementById("progress");
            const output = document.getElementById("output");

            progress.classList.remove("hidden");
            output.classList.add("hidden");
            progress.textContent = "Đang tải file JSON hiện tại...";

            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/data.json`);
                const data = await response.json();
                const existingContent = atob(data.content);
                const jsonData = JSON.parse(existingContent);

                const title = document.getElementById("title").value;
                const description = document.getElementById("description").value;

                let coverValue = '';

                if (document.querySelector('#upload-cover').classList.contains('active')) {
                    const coverFile = document.getElementById("cover-upload").files[0];                    if (coverFile) {
                        progress.textContent = "Đang upload ảnh bìa...";
                        const coverBlob = await fileToBase64(coverFile);
                        const coverFileName = `covers/${coverFile.name}`;
                        await uploadFileToRepo(REPO_NAME, token, coverFileName, coverBlob);
                        coverValue = `./${coverFileName}`;
                    }
                } else {
                    coverValue = document.getElementById("cover-url").value;
                }

                const chapters = [];
                const chapterElements = document.querySelectorAll(".chapter");
                let chapIndex = 1;

                for (let i = 0; i < chapterElements.length; i++) {
                    const el = chapterElements[i];
                    const nameInput = el.querySelector(".chapter-name");

                    if (nameInput.value) {
                        let pages = [];

                        if (el.querySelector(`#upload-pages-${i}`).classList.contains('active')) {
                            const files = el.querySelector(`#upload-pages-${i} input[type="file"]`).files;
                            for (let j = 0; j < files.length; j++) {
                                const pageFile = files[j];
                                progress.textContent = `Đang upload ảnh chapter ${chapIndex}, trang ${j + 1}...`;

                                const pageBlob = await fileToBase64(pageFile);
                                const pageFileName = `pages/${pageFile.name}`;
                                await uploadFileToRepo(REPO_NAME, token, pageFileName, pageBlob);
                                pages.push(`./${pageFileName}`);
                            }
                        } else {
                            const urlInputs = el.querySelectorAll(`#url-pages-${i} .page-url-input`);
                            pages = Array.from(urlInputs).map(input => input.value).filter(Boolean);
                        }

                        chapters.push({
                            id: chapIndex++,
                            name: nameInput.value,
                            pages: pages
                        });
                    }
                }

                const newComic = {
                    id: title.toLowerCase().replace(/\s+/g, '_'),
                    title: title,
                    desc: description,                    cover: coverValue,
                    chapters: chapters
                };

                jsonData.comics.push(newComic);

                const updatedJsonString = JSON.stringify(jsonData, null, 2);
                const encodedContent = btoa(updatedJsonString);

                const updateResponse = await fetch(`https://api.github.com/repos/${REPO_NAME}/contents/data.json`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Add new comic: ${title}`,
                        content: encodedContent,
                        sha: data.sha
                    })
                });

                const result = await updateResponse.json();

                progress.classList.add("hidden");
                output.classList.remove("hidden");
                output.textContent = "✅ Truyện và ảnh đã được upload lên GitHub!\n" + JSON.stringify(result, null, 2);
            } catch (error) {
                progress.textContent = "❌ Lỗi: " + error.message;
            }
        });

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = error => reject(error);
            });
        }

        async function uploadFileToRepo(repo, token, path, content) {
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                method: "PUT",
                headers: {
                    "Authorization": `Bearer ${token}`,
                    "Content-Type": "application/json"                },
                body: JSON.stringify({
                    message: `Upload ${path}`,
                    content: content
                })
            });

            if (!response.ok) {
                throw new Error(`Lỗi upload ảnh: ${path}`);
            }
        }
    </script>
</body>
</html>
