<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Thế Giới Truyện Tranh</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #2c2c2c;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        header { text-align: center; padding: 30px 0; }
        h1 { font-size: 2.7rem; color: #ffcc00; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .comic-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .comic-card {
            background: #3a3a3a;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .comic-card:hover { transform: translateY(-10px); }
        .comic-cover { width: 100%; height: 300px; object-fit: cover; }
        .comic-info { padding: 15px; }
        .comic-title { font-size: 1.2rem; color: #ffcc00; margin-bottom: 8px; }
        .comic-desc { font-size: 0.9rem; color: #aaa; }
        footer { text-align: center; padding: 30px 0; color: #aaa; font-size: 0.9rem; }
        .no-style-link { text-decoration: none; color: inherit; }
        .loading { text-align: center; color: #aaa; font-size: 1.2rem; margin: 50px 0; }
    </style>
</head>
<body>
    <header>
        <h1>Thế Giới Truyện Tranh</h1>
        <p>Nơi lưu trữ những bộ truyện tranh yêu thích của bạn</p>
    </header>

    <div class="container">
        <div id="loading" class="loading">Đang tải dữ liệu...</div>
        <div id="comic-list" class="comic-list" style="display:none;"></div>
    </div>

    <footer>
        <p>&copy; 2026 Thế Giới Truyện Tranh | Designed with ❤️</p>
    </footer>

    <script>
        async function fetchData() {
            const response = await fetch('./data.json');
            const data = await response.json();
            return data.comics;
        }

        async function init() {
            const comics = await fetchData();
            const container = document.getElementById("comic-list");

            if (comics.length === 0) {
                document.getElementById("loading").textContent = "Chưa có truyện nào cả.";
                return;
            }

            document.getElementById("loading").style.display = "none";
            container.style.display = "grid";

            comics.forEach(comic => {
                const comicCard = document.createElement("a");
                comicCard.href = `comic-detail.html?id=${comic.id}`;
                comicCard.className = "no-style-link";

                comicCard.innerHTML = `
                    <div class="comic-card">
                        <img src="${comic.cover || 'https://placehold.co/300x400/444/ccc?text=No+Image'}" 
                             alt="${comic.title}" class="comic-cover">
                        <div class="comic-info">
                            <h3 class="comic-title">${comic.title}</h3>
                            <p class="comic-desc">${comic.desc || "Chưa có mô tả."}</p>
                        </div>
                    </div>
                `;

                container.appendChild(comicCard);
            });
        }

        init();
    </script>
</body>
</html>
