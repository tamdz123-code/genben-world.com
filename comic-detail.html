<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Chi tiết truyện</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #2c2c2c;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }
        .top-left {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        .back-btn {
            padding: 10px 20px;
            background: #ffcc00;
            color: #2c2c2c;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            font-size: 1rem;
        }
        .back-btn:hover { opacity: 0.9; }
        .container { max-width: 1000px; margin: 0 auto; margin-top: 60px; }
        .comic-header { display: flex; align-items: center; gap: 20px; margin: 20px 0; }
        .comic-cover { width: 200px; height: 300px; object-fit: cover; border-radius: 8px; }
        .comic-info { flex: 1; }
        .comic-title { font-size: 1.8rem; color: #ffcc00; }
        .comic-desc { margin-top: 10px; font-size: 1rem; color: #ccc; line-height: 1.5; }
        .chapter-list { margin-top: 30px; }
        .chapter-item { padding: 15px; background: #3a3a3a; margin-bottom: 10px; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .chapter-item:hover { background: #444; }
        .loading { text-align: center; color: #aaa; font-size: 1.2rem; margin: 50px 0; }
    </style>
</head>
<body>
    <a href="./index.html" class="back-btn">← Trang chủ</a>

    <div class="container">
        <div id="loading" class="loading">Đang tải dữ liệu...</div>

        <div id="comic-content" style="display:none;">
            <div class="comic-header">
                <img id="comic-cover" src="" alt="Ảnh bìa" class="comic-cover">                <div class="comic-info">
                    <h2 id="comic-title-detail"></h2>
                    <p id="comic-description"></p>
                </div>
            </div>

            <div class="chapter-list">
                <h3>Danh sách Chapter</h3>
                <div id="chapters-container"></div>
            </div>
        </div>
    </div>

    <script>
        async function fetchData() {
            const response = await fetch('./data.json');
            const data = await response.json();
            return data.comics;
        }

        function getParameterByName(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        async function init() {
            const comics = await fetchData();
            const comicId = getParameterByName('id');

            const comic = comics.find(c => c.id === comicId);
            if (!comic) {
                document.getElementById("loading").textContent = "Không tìm thấy truyện!";
                return;
            }

            document.getElementById("loading").style.display = "none";
            document.getElementById("comic-content").style.display = "block";

            document.getElementById("comic-title-detail").textContent = comic.title;
            document.getElementById("comic-description").textContent = comic.desc;
            document.getElementById("comic-cover").src = comic.cover || "https://placehold.co/300x400/444/ccc?text=No+Image";

            const chaptersContainer = document.getElementById("chapters-container");
            chaptersContainer.innerHTML = "";

            comic.chapters.forEach(chapter => {
                const chapterDiv = document.createElement("div");
                chapterDiv.className = "chapter-item";
                chapterDiv.textContent = chapter.name;
                chapterDiv.onclick = () => {                    window.location.href = `reader.html?comic=${comicId}&chapter=${chapter.id}`;
                };
                chaptersContainer.appendChild(chapterDiv);
            });
        }

        init();
    </script>
</body>
</html>
